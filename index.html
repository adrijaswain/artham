<!doctype html>
<html lang="en" class="light">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Artham</title>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              // --- Neutral, clean palette: near-white surfaces, soft-gray
              //     borders, one calm blue accent, restrained teal for success ---

              // Accent (primary) — Meditrace teal/mint brand color
              primary: "#14b8a6",
              "on-primary": "#ffffff",
              "primary-container": "#ccfbf1",
              "on-primary-container": "#0f766e",
              "primary-fixed": "#ccfbf1",
              "primary-fixed-dim": "#99f6e4",
              "on-primary-fixed": "#042f2e",
              "on-primary-fixed-variant": "#0f766e",
              "inverse-primary": "#5eead4",
              "surface-tint": "#14b8a6",

              // Success / secondary (calm teal)
              secondary: "#0d9488",
              "on-secondary": "#ffffff",
              "secondary-container": "#ccfbf1",
              "on-secondary-container": "#115e59",
              "secondary-fixed": "#ccfbf1",
              "secondary-fixed-dim": "#99f6e4",
              "on-secondary-fixed": "#042f2e",
              "on-secondary-fixed-variant": "#115e59",

              // Tertiary (muted amber, used sparingly)
              tertiary: "#b45309",
              "on-tertiary": "#ffffff",
              "tertiary-container": "#fef3c7",
              "on-tertiary-container": "#92400e",
              "tertiary-fixed": "#fef3c7",
              "tertiary-fixed-dim": "#fde68a",
              "on-tertiary-fixed": "#451a03",
              "on-tertiary-fixed-variant": "#92400e",

              // Error
              error: "#dc2626",
              "on-error": "#ffffff",
              "error-container": "#fee2e2",
              "on-error-container": "#991b1b",

              // Neutral surfaces (grayscale) — subtly off-white page so white
              // cards/chrome separate cleanly without heavy shadows.
              background: "#f6f7f9",
              surface: "#ffffff",
              "surface-bright": "#ffffff",
              "surface-dim": "#eef0f3",
              "surface-variant": "#f2f3f5",
              "surface-container-lowest": "#ffffff",
              "surface-container-low": "#f6f7f9",
              "surface-container": "#f1f3f5",
              "surface-container-high": "#eaecef",
              "surface-container-highest": "#e3e6ea",

              // Text / on-colors
              "on-surface": "#18181b",
              "on-background": "#18181b",
              "on-surface-variant": "#6b7280",
              outline: "#9ca3af",
              "outline-variant": "#e5e7eb",

              // Inverse (for tooltips / dark chips)
              "inverse-surface": "#27272a",
              "inverse-on-surface": "#fafafa",
            },
            borderRadius: {
              DEFAULT: "0.5rem",
              lg: "0.75rem",
              xl: "1rem",
              full: "9999px",
            },
            spacing: {
              base: "8px",
              xl: "80px",
              "container-max": "1200px",
              md: "24px",
              lg: "48px",
              "margin-mobile": "16px",
              xs: "4px",
              gutter: "24px",
              sm: "12px",
            },
            fontFamily: {
              "headline-md": ["Public Sans"],
              "body-sm": ["Public Sans"],
              "label-sm": ["Public Sans"],
              "headline-lg-mobile": ["Public Sans"],
              "label-md": ["Public Sans"],
              "body-lg": ["Public Sans"],
              "body-md": ["Public Sans"],
              "headline-sm": ["Public Sans"],
              "headline-lg": ["Public Sans"],
            },
            fontSize: {
              "headline-md": ["24px", { lineHeight: "32px", fontWeight: "600" }],
              "body-sm": ["14px", { lineHeight: "20px", fontWeight: "400" }],
              "label-sm": ["12px", { lineHeight: "16px", fontWeight: "600" }],
              "headline-lg-mobile": ["24px", { lineHeight: "32px", letterSpacing: "-0.01em", fontWeight: "700" }],
              "label-md": ["14px", { lineHeight: "16px", letterSpacing: "0.01em", fontWeight: "600" }],
              "body-lg": ["18px", { lineHeight: "28px", fontWeight: "400" }],
              "body-md": ["16px", { lineHeight: "24px", fontWeight: "400" }],
              "headline-sm": ["20px", { lineHeight: "28px", fontWeight: "600" }],
              "headline-lg": ["32px", { lineHeight: "40px", letterSpacing: "-0.02em", fontWeight: "700" }],
            },
          },
        },
      };
    </script>
    <style>
      body {
        font-family: "Public Sans", sans-serif;
        scroll-behavior: smooth;
      }
      .material-symbols-outlined {
        font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24;
        vertical-align: middle;
      }
      .fill-icon {
        font-variation-settings: "FILL" 1;
      }
      .tonal-card-shadow {
        box-shadow: 0 1px 2px rgba(24, 24, 27, 0.04), 0 4px 12px rgba(24, 24, 27, 0.05);
      }
      .custom-scrollbar::-webkit-scrollbar { width: 6px; }
      .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
      .custom-scrollbar::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 10px; }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #d1d5db; }
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 10px; }
      ::-webkit-scrollbar-thumb:hover { background: #d1d5db; }
      @keyframes pulse-soft { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
      .active-entity-pulse { animation: pulse-soft 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }

      /* Monochrome theme scope: dashboard is BLACK & WHITE only —
         black text, white backgrounds, black hairline borders. No grey. */
      .dash-mono { color: #000; }
      /* All text (grey secondary text + accents) → black; inverted labels stay white */
      .dash-mono [class*="text-on-surface-variant"],
      .dash-mono [class*="text-outline"],
      .dash-mono [class*="text-error"],
      .dash-mono [class~="text-on-surface"],
      .dash-mono [class~="text-primary"],
      .dash-mono [class~="text-secondary"],
      .dash-mono [class~="text-tertiary"],
      .dash-mono [class~="text-on-primary-container"],
      .dash-mono [class~="text-on-secondary-container"],
      .dash-mono [class~="text-green-700"],
      .dash-mono [class~="text-amber-700"] { color: #000 !important; }
      /* Solid accents / selected fills → black */
      .dash-mono [class~="bg-primary"],
      .dash-mono [class~="bg-secondary"],
      .dash-mono [class*="bg-error"],
      .dash-mono [class~="bg-green-500"],
      .dash-mono [class~="bg-amber-500"] { background-color: #000 !important; }
      /* Every grey / tinted surface → white */
      .dash-mono [class*="bg-surface"],
      .dash-mono [class*="bg-white"],
      .dash-mono [class~="bg-primary-container"],
      .dash-mono [class~="bg-secondary-container"],
      .dash-mono [class~="bg-tertiary-container"],
      .dash-mono [class~="bg-green-100"],
      .dash-mono [class~="bg-amber-100"] { background-color: #fff !important; }
      /* Flatten faint accent tints & gradients */
      .dash-mono [class*="bg-gradient"] { background-image: none !important; }
      .dash-mono [class~="bg-primary/5"],
      .dash-mono [class~="bg-secondary/5"],
      .dash-mono [class~="bg-secondary/10"] { background-color: transparent !important; }
      /* Borders → black hairline */
      .dash-mono [class*="border-outline"],
      .dash-mono [class~="border-primary"],
      .dash-mono [class~="border-secondary"],
      .dash-mono [class~="border-secondary-container"],
      .dash-mono [class~="border-l-primary"],
      .dash-mono [class~="border-l-secondary"],
      .dash-mono [class~="border-l-tertiary"] { border-color: #000 !important; }
    </style>
  </head>
  <body class="bg-background text-on-background">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
